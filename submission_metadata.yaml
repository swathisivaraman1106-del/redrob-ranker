ai_usage_summary: |
  Used Claude for architecture discussion, code review, and debugging.
  No candidate data was fed to any LLM. All ranking logic and scoring
  decisions are original work.

methodology_summary: |
  Multi-signal candidate ranking pipeline with 5 scoring components.
  Title score (35%) is the primary signal against keyword-stuffer traps —
  candidates with irrelevant titles like HR Manager or Accountant are
  penalized even with strong AI skill lists. Skills score (20%) uses
  keyword matching with proficiency weights and honeypot detection
  (expert-level skills with 0 months experience are ignored). Career
  score (20%) rewards product company experience and penalizes pure
  services-company backgrounds (TCS, Infosys, Wipro etc.) per JD
  requirements, combined with experience range fit (5-9 years ideal).
  Behavioral score (15%) uses Redrob signals — recency, open-to-work
  flag, recruiter response rate, notice period, and interview completion
  rate. Semantic score (10%) uses sentence-transformers (all-MiniLM-L6-v2)
  to measure profile-JD semantic similarity beyond keyword overlap.

declarations:
